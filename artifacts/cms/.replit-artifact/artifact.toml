kind = "web"
previewPath = "/cms/"
title = "OneSoft CMS Admin"
version = "1.0.0"
id = "artifacts/cms"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/cms/" ]
localPort = 23740

[services.development]
run = "pnpm --filter @workspace/cms run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/cms", "run", "build" ]
publicDir = "artifacts/cms/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "23740"
BASE_PATH = "/cms/"
